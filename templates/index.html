<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookshelf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1 class="site-title">My Bookshelf</h1>
        <p class="site-tagline">A reading journal</p>
    </header>

    <main>
        <div class="books-grid" id="booksGrid"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <p class="empty-icon">~</p>
            <p class="empty-text">Your shelf is empty!</p>
            <p class="empty-hint">Add your first book:</p>
            <code class="empty-command">python bookshelf.py add --title "Book Title" --author "Author" --date "2025-01-15" --note "Loved it!" --photo cover.jpg</code>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
